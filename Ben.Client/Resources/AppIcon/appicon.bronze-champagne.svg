  </g>

  <g stroke="url(#champagneGlint)" stroke-width="26" stroke-linejoin="round" stroke-linecap="round" opacity="0.82">
    <path d="M220 300 
             L804 300 
             L512 820 
             Z"/>
    <line x1="512" y1="820" x2="512" y2="980" />
